# ============================================================
# LAE_pinn — default configuration
# ============================================================

data:
  sim_root: "../simulation"           # relative to LAE_pinn/
  redshifts: [7.14, 6.6, 5.756]
  box_size_mpc: 160.0                 # cMpc/h
  grid_full: 512
  grid_mvp: 64                        # downsampled working resolution
  muv_cut: -19.0                      # observed-only LAE threshold
  tigm_key: "TIGM"                    # Lobs/Lint

graph:
  k_neighbors: 16
  r_link_mpc: 20.0                    # max edge radius (cMpc/h)
  node_features:                      # names must match data loader output
    - pos_x
    - pos_y
    - pos_z
    - muv
    - log_mass
    - tigm
    - ew_obs
    - lya_obs_norm

gnn:
  architecture: GATv2Conv             # or SAGEConv
  n_layers: 3
  hidden_dim: 64
  heads: 4                            # for GAT
  dropout: 0.1
  output_dim: 32                      # environment embedding size

source_head:
  f_esc_hidden: [32, 16]
  xi_ion_learnable: false             # if false, fixed at log10(25.2)
  xi_ion_log: 25.2                    # ionizing photon production efficiency

# RSD correction: network learns to invert per-source LOS position shift
# caused by peculiar velocities.  Halo_Position.npy is in redshift space;
# Xbox_grid is in real space.  This head predicts Δr∥_i from the local
# environment embedding so the scatter step operates in real space.
rsd_correction:
  enabled: True                      # set true to activate
  max_shift_mpc: 5                  # ±2 cMpc/h ≈ ±1 voxel at 64³, z~7
  los_axis: 0                         # 0/1/2 — which axis is line-of-sight

kernel:
  type: mixture                       # "mfp" | "bubble" | "mixture"
  # Learnable initial values (softplus / sigmoid applied internally)
  R_init_mpc: 5.0                     # soft bubble radius
  delta_init_mpc: 1.0                 # bubble edge width
  lambda_mfp_init_mpc: 20.0          # mean free path
  A_geom_init: 0.5                    # geom weight before softmax
  A_trans_init: 0.5                   # trans weight before softmax

# Field generator for the ionization field (observed-source term):
#   continuous (default) — resolution-free kernel sum J_obs(x)=Σ_i w_i K(|x-x_i|)
#                          rendered on the grid with EXACT source positions; removes
#                          the trilinear voxel smearing of scatter+FFT and lets you
#                          query x_HII at arbitrary coordinates (model.continuous_field()).
#   grid                 — legacy trilinear scatter + FFT convolution.
# Identical on-grid for on-grid sources; A_obs / J_ref calibration unchanged.
# (Bubble excursion always uses the scatter path; continuous SDF variant is future work.)
field_generator: continuous
continuous_field:
  generator: continuous     # "continuous" | "grid"  (overrides field_generator if set)
  r_cut_mpc: 50           # optional cutoff (cMpc/h) for the kernel sum; null = full sum
  chunk: 4096               # query-point chunk size (memory control)

unresolved_sources:
  # HOD-based faint source model.  Basis fields are pre-computed once before
  # training from the halo catalog (simulation) or ACF-fitted HOD (observations).
  # Only f_esc per mass bin is learned during training.
  model: linear                      # linear | conditional  (run_from_config / run_mvp)
  profile_source: observed_acf        # conditional only: observed_acf | cof | powerlaw
  dv_max_kms: 1000.0                  # conditional only: LOS window [km/s]
  n_lae_mass_bins: 4                  # conditional only: LAE mass bins in the stack
  #
  # Bin edges are generated dynamically from data.muv_cut to -15.0 in 0.5 mag steps
  # by run_mvp.py (and other runners), so n_hod_bins here is informational only —
  # the actual value is len(arange(muv_cut, -15.0, 0.5)).
  # For muv_cut=-19: edges [-19, -18.5, ..., -15] → 9 bins.
  muv_faint_limit: -15.0              # faintest bin edge (simulation has no halos below)
  muv_bin_step: 0.5                   # step size in mag between HOD bins
  smoothness_weight: 1.0e-3           # TV prior on ε_unres (in loss.py)
  # ── Observations interface ───────────────────────────────────────────────
  # Set hod_from_observations.enabled: true when applying to real data.
  # Provide per-bin params from ACF fitting + HOD extrapolation.
  hod_from_observations:
    enabled: false
    # bias_per_bin: [4.2, 2.8, 1.9]         # linear bias from ACF fitting
    # n_bar_per_bin: [3.0e-4, 8.0e-4, 2.0e-3]  # number density (cMpc/h)^-3
    # mean_log_lum_per_bin: [40.1, 39.5, 38.8]  # log10(L_Lyα) from abundance matching

excursion_set:
  # type: "equilibrium" | "bubble" | "bubble_equilibrium"
  #   equilibrium        — smooth x(J) = (√(A²+4A)−A)/2, A = J/s (satisfies
  #                        photoionization equilibrium; floors above 0 in voids)
  #   bubble             — excursion-set photon-counting threshold (sharp 0/1
  #                        topology, real neutral voids; no interior residual)
  #   bubble_equilibrium — HYBRID x_HII = B(x)·x_eq(x): bubble topology × the
  #                        photoionization-equilibrium interior residual. Makes the
  #                        bubble interior satisfy photoionization equilibrium.
  type: equilibrium
  # s = alpha_nH_scale: one scalar for α(T)·⟨n_H⟩ + J unit conversion
  # Mapping: A = g·J/s,  x_HII = (√(A²+4A)−A)/2;  g from global ξ constraint
  #
  # IMPORTANT: run_mvp.py and run_stress.py override this value at runtime
  # using the exact analytic inverse:  A = xi^2/(1-xi),  alpha_init = 1/A.
  # Example: xi=0.308 → alpha_init ≈ 7.3.  The default of 1.0 is 6× too
  # small and causes x_pred to be pinned above 0.5 for hundreds of epochs.
  alpha_nH_scale_init: 1.0   # overridden by runners; do not rely on this value
  # Hybrid only: residual photoionization scale s. Small → x_eq ~ 1 inside
  # bubbles, so the hybrid starts ~ the pure bubble and refines the interior.
  hybrid_residual_scale_init: 0.1

training:
  batch_size: 1                       # 1 snapshot per step (full-field)
  n_epochs: 200
  lr: 1.0e-3
  lr_scheduler: cosine
  warmup_epochs: 10
  weight_decay: 1.0e-5
  loss_weights:
    field_mse: 1.0
    power_spectrum: 0.1
    binary_bce: 0.5
    mcf_consistency: 0.05
    global_xHII: 1.0
    prior: 0.1

evaluation:
  mcf_r_bins: [2, 4, 6, 8, 10, 15, 20, 30]   # cMpc/h
  granulometry_r_max: 30.0
  granulometry_n_steps: 20
  percolation_threshold: 0.5
  muv_cuts: [-17.5, -18.0, -19.0]

experiment:
  seed: 42
  device: cuda                        # or cpu
  save_dir: "runs/"
  log_every: 10

# MVP single-snapshot run (python -m experiments.run_mvp --config)
mvp:
  redshift: 7.14                      # defaults to data.redshifts[0] if omitted
  save_subdir: mvp                      # output → runs/mvp/
  subsample: null                       # max halos in graph (null = all)

# ============================================================
# Source degeneracy stress tests
# ============================================================
stress_tests:
  S1_observed_only:
    muv_cut: -17.5
    use_all_halos: false
  S2_oracle_all_halo:
    muv_cut: -99.0                    # include all
    use_all_halos: true
  S3_fixed_source_oracle:
    source_prescription: "fiducial"   # from simulation
  S4_wrong_source_massive:
    force_source_model: "massive_only"  # M_h > 1e11 M_sun
  S5_wrong_source_faint:
    force_source_model: "faint_only"    # M_h < 1e10 M_sun
  S6_learned_mixture:
    learn_F_b: true
  S7_ensemble_posterior:
    train_redshifts: [7.14, 6.6]
    test_redshifts: [5.756]
